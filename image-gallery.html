<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery with Navigation Arrows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Gallery Container */
        .gallery-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Image Display Area */
        .gallery-wrapper {
            position: relative;
            height: 400px;
            background-color: #000;
            overflow: hidden;
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Navigation Arrows */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 107, 107, 0.8);
            color: white;
            border: none;
            font-size: 30px;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            z-index: 10;
        }

        .arrow-btn:hover {
            background-color: rgba(255, 107, 107, 1);
        }

        /* Left Arrow - positioned on left */
        .arrow-left {
            left: 10px;
        }

        /* Right Arrow - positioned on right */
        .arrow-right {
            right: 10px;
        }

        /* Image Counter & Info */
        .gallery-info {
            padding: 15px 20px;
            text-align: center;
            background-color: #f9f9f9;
        }

        .image-counter {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .image-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        /* Dots/Indicators */
        .dot-container {
            text-align: center;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.3);
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        .dot {
            height: 8px;
            width: 8px;
            margin: 0 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .dot.active {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>

<body>

    <div class="gallery-container">
        <div class="gallery-wrapper">
            <img id="galleryImage" src="photos/Seva1.jpeg" alt="Gallery Image" class="gallery-image">

            <!-- Left Arrow -->
            <button class="arrow-btn arrow-left" onclick="previousImage()">❮</button>

            <!-- Right Arrow -->
            <button class="arrow-btn arrow-right" onclick="nextImage()">❯</button>

            <!-- Dots Indicator -->
            <div class="dot-container">
                <span class="dot active" onclick="currentImage(1)"></span>
                <span class="dot" onclick="currentImage(2)"></span>
                <span class="dot" onclick="currentImage(3)"></span>
                <span class="dot" onclick="currentImage(4)"></span>
            </div>
        </div>

        <!-- Image Info -->
        <div class="gallery-info">
            <div class="image-counter">
                <span id="currentIndex">1</span> / <span id="totalImages">4</span>
            </div>
            <div class="image-title" id="imageTitle">Project SEVA</div>
        </div>
    </div>

    <script>
        // Array of images with titles
        const images = [
            { src: 'photos/Seva1.jpeg', title: 'Project SEVA - Food Distribution' },
            { src: 'photos/Seva4.jpeg', title: 'Project SEVA - Community Support' },
            { src: 'photos/Education1.jpg', title: 'Project Education Initiative' },
            { src: 'photos/logo.jpg', title: 'InAmigos Foundation Logo' }
        ];

        let currentIndex = 0;

        // Function to show image at specific index
        function showImage(index) {
            // Wrap around if index goes out of bounds
            if (index >= images.length) {
                currentIndex = 0;
            } else if (index < 0) {
                currentIndex = images.length - 1;
            } else {
                currentIndex = index;
            }

            // Update image
            document.getElementById('galleryImage').src = images[currentIndex].src;
            document.getElementById('imageTitle').textContent = images[currentIndex].title;
            document.getElementById('currentIndex').textContent = currentIndex + 1;

            // Update dots
            updateDots();
        }

        // Next image
        function nextImage() {
            showImage(currentIndex + 1);
        }

        // Previous image
        function previousImage() {
            showImage(currentIndex - 1);
        }

        // Jump to specific image
        function currentImage(index) {
            showImage(index - 1);
        }

        // Update active dot
        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // Keyboard navigation (optional)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') previousImage();
        });
    </script>

</body>

</html>
